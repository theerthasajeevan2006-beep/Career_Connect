{% extends 'base/base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow p-4">

                <h2 class="text-center mb-4">
                    Recruiter Registration
                </h2>

                <form method="POST" enctype="multipart/form-data">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input type="text"
                               name="username"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        <input type="email"
                               name="email"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        <input type="password"
                               name="password"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Company Name
                        </label>

                        <input type="text"
                               name="company_name"
                               class="form-control"
                               required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Company Description
                        </label>

                        <textarea name="description"
                                  class="form-control"
                                  rows="4"></textarea>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Company Logo
                        </label>

                        <input type="file"
                               name="company_logo"
                               class="form-control">

                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100">

                        Register

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
